version: 1
database: demo_electricity_ops
description: >
  Static semantic model for enterprise electricity disconnect lifecycle.
  Dynamic assets such as join_hints, value_patterns, metrics, and intent_rules are DB-managed.

settings:
  default_limit: 100
  timezone: UTC
  sql_dialect: postgres

entities:
  DisconnectRequest:
    description: Enterprise electricity disconnect request lifecycle.
    synonyms:
      - disconnect request
      - electricity disconnect
      - service termination
    example_questions:
      - show requests in Team1 queue
      - list requests at status 810
      - show approvals submitted today
    tables:
      primary: zp_disco_request
      related:
        - zp_disco_trans_data
        - zp_inventory_data
        - zp_action_status
    fields:
      requestId:
        column: zp_disco_request.request_id
        type: string
        key: true
        searchable: true
        filterable: true
      customerName:
        column: zp_disco_request.customer_name
        type: string
        searchable: true
        filterable: true
      customerId:
        column: zp_disco_request.customer_id
        type: string
        searchable: true
        filterable: true
      feederId:
        column: zp_disco_request.feeder_id
        type: string
        searchable: true
        filterable: true
      transformerConnectionId:
        column: zp_disco_request.transformer_connection_id
        type: string
        searchable: true
        filterable: true
      status:
        column: zp_disco_request.status
        type: number
        filterable: true
        allowed_values:
          - 0
          - 120
          - 200
          - 404
          - 500
          - 700
          - 710
          - 800
          - 810
          - 835
          - 840
          - 841
          - 850
          - 855
      signedDisconnectDocument:
        column: zp_disco_request.signed_disconnect_document
        type: boolean

  DiscoTransData:
    description: Status/action transaction trail for Team1 and Team2 flow.
    synonyms:
      - workflow transaction
      - assignment trail
      - approval trail
    example_questions:
      - show action trail for request REQ-20260311-0002
      - list approve and submit actions
      - show disconnect order numbers
    tables:
      primary: zp_disco_trans_data
      related:
        - zp_disco_request
        - zp_action_status
    fields:
      id:
        column: zp_disco_trans_data.id
        type: number
        key: true
      requestId:
        column: zp_disco_trans_data.request_id
        type: string
        searchable: true
        filterable: true
      actionId:
        column: zp_disco_trans_data.action_id
        type: number
        filterable: true
      status:
        column: zp_disco_trans_data.status
        type: number
        filterable: true
      disconnectOrderNo:
        column: zp_disco_trans_data.disconnect_order_no
        type: string
        searchable: true
        filterable: true
      loggedUserId:
        column: zp_disco_trans_data.logged_user_id
        type: string
        searchable: true
        filterable: true
      notesText:
        column: zp_disco_trans_data.notes_text
        type: string
        searchable: true
      dueDate:
        column: zp_disco_trans_data.due_date
        type: date

  ActionStatus:
    description: Static action-to-status transition rule table.
    synonyms:
      - action rules
      - workflow rules
      - status transition matrix
    tables:
      primary: zp_action_status
      related:
        - zp_disco_trans_data
    fields:
      actionId:
        column: zp_action_status.action_id
        type: number
        key: true
      actionValue:
        column: zp_action_status.action_value
        type: string
      status:
        column: zp_action_status.status
        type: number
      nextStatus:
        column: zp_action_status.nxt_status
        type: number
      team:
        column: zp_action_status.team
        type: number

  InventoryData:
    description: Inventory validation snapshot by request.
    tables:
      primary: zp_inventory_data
      related:
        - zp_disco_request
    fields:
      inventoryId:
        column: zp_inventory_data.inventory_id
        type: number
        key: true
      requestId:
        column: zp_inventory_data.request_id
        type: string
        searchable: true
        filterable: true
      feederId:
        column: zp_inventory_data.feeder_id
        type: string
        searchable: true
        filterable: true
      transformerConnectionId:
        column: zp_inventory_data.transformer_connection_id
        type: string
        searchable: true
        filterable: true
      feederState:
        column: zp_inventory_data.feeder_state
        type: string
        filterable: true

tables:
  zp_disco_request:
    description: enterprise electricity disconnect request master
    columns:
      request_id: { type: varchar, primary_key: true }
      customer_name: { type: varchar }
      customer_id: { type: varchar }
      feeder_id: { type: varchar }
      transformer_connection_id: { type: varchar }
      plan_id: { type: varchar }
      address_location: { type: varchar }
      signed_disconnect_document: { type: boolean }
      status: { type: integer }
      status_reason: { type: varchar }
      assigned_team: { type: varchar }
      created_at: { type: timestamptz }
      updated_at: { type: timestamptz }

  zp_action_status:
    description: static action/status transition rule table
    columns:
      action_id: { type: integer, primary_key: true }
      action_value: { type: varchar }
      status: { type: integer }
      nxt_status: { type: integer }
      team: { type: integer }
      enabled: { type: boolean }

  zp_inventory_data:
    description: inventory snapshot used by nightly validation
    columns:
      inventory_id: { type: bigint, primary_key: true }
      request_id:
        type: varchar
        foreign_key: { table: zp_disco_request, column: request_id }
      feeder_id: { type: varchar }
      transformer_connection_id: { type: varchar }
      customer_id: { type: varchar }
      customer_name: { type: varchar }
      plan_id: { type: varchar }
      address_location: { type: varchar }
      feeder_state: { type: varchar }
      feeder_closed_date: { type: date }
      last_verified_at: { type: timestamptz }

  zp_disco_trans_data:
    description: transaction log for action and status progression
    columns:
      id: { type: bigint, primary_key: true }
      request_id:
        type: varchar
        foreign_key: { table: zp_disco_request, column: request_id }
      action_id:
        type: integer
        foreign_key: { table: zp_action_status, column: action_id }
      status: { type: integer }
      disconnect_order_no: { type: varchar }
      logged_user_id: { type: varchar }
      notes_text: { type: text }
      due_date: { type: date }
      created_at: { type: timestamptz }

relationships:
  - name: request_to_inventory
    from: { table: zp_disco_request, column: request_id }
    to: { table: zp_inventory_data, column: request_id }
    type: one_to_one
  - name: request_to_trans
    from: { table: zp_disco_request, column: request_id }
    to: { table: zp_disco_trans_data, column: request_id }
    type: one_to_many
  - name: action_rule_to_trans
    from: { table: zp_action_status, column: action_id }
    to: { table: zp_disco_trans_data, column: action_id }
    type: one_to_many

synonyms:
  disconnect: [terminate electricity, service cease, stop power]
  feeder: [circuit, supply line]
  transformer: [connection point]

metrics: {}
join_hints: {}
value_patterns: []
intent_rules: {}

rules:
  allowed_tables: [zp_disco_request, zp_inventory_data, zp_disco_trans_data, zp_action_status]
  deny_operations: [DELETE, UPDATE, DROP, TRUNCATE, INSERT]
  max_result_limit: 500
